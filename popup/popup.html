<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>KillShort</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>KillShort</h1>
      <p class="lead">Block Instagram Reels & YouTube Shorts — hide the Shorts tab and remove short-form recommendations from feeds.</p>

      <div class="row" style="margin-top:8px">
        <div>
          <div style="font-size:13px">Blocking</div>
          <div class="small">Toggle site-wide blocking</div>
        </div>
        <div class="toggle" id="toggleWrap" tabindex="0" role="button" aria-pressed="false" aria-label="Enable KillShort">
          <div id="switch" class="switch" role="switch" aria-checked="false">
            <div class="knob"></div>
          </div>
          <span id="statusLabel" class="status-label">OFF</span>
        </div>
      </div>

      <button class="primary" id="applyBtn">Apply now (refreshes tabs)</button>



    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
